services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: opspilot-postgres
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend ─────────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
    container_name: opspilot-api
    # Loads QWEN_API_KEY (and any other secrets) from backend/.env on the host.
    # The file is not baked into the image — safe to keep out of version control.
    # required: false means the stack still starts if the file is absent.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      PORT: "8080"
      APP_NAME: OpsPilot AI
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: opspilot
      DB_PASSWORD: opspilot
      DB_NAME: opspilot
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  web:
    build:
      context: ./frontend
      args:
        # Baked into Next.js routes-manifest.json at build time.
        # The Next.js server (inside the container) reaches the API via Docker's
        # internal DNS — not localhost, which would loop back to the web container.
        BACKEND_URL: http://api:8080
    container_name: opspilot-web
    environment:
      # Runtime env var — read by the Route Handler at request time.
      # The build arg above bakes it into rewrites; this makes it available
      # to server-side Route Handlers where process.env is read at runtime.
      BACKEND_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
