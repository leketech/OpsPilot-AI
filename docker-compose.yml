services:
  # 🧠 AI-Ready PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opspilot-postgres
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Uncomment the line below when you create your init.sql file
      # - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ⚡ Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: opspilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 🚀 Your Go Fiber Backend
  api:
    build:
      context: ./backend
    container_name: opspilot-api
    environment:
      PORT: "8080"
      # These exactly match the .env.example and Go config we wrote!
      APP_NAME: OpsPilot AI
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: opspilot
      DB_PASSWORD: opspilot
      DB_NAME: opspilot
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 🌐 Your Frontend (Optional)
  web:
    build:
      context: ./frontend
    container_name: opspilot-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles:
      - fullstack # Only starts if you specifically ask for it

volumes:
  postgres_data:
  redis_data: